services:
  panel:
    build: .
    container_name: panel
    restart: unless-stopped
    ports:
      - '6511:6511'
    volumes:
      # Persistent data (database)
      - panel-data:/data
      # Mount your book/manga libraries
      - /mnt/books/manga:/libraries/manga:ro
    environment:
      - PANEL_PORT=6511
      - PANEL_DATA_DIR=/data
      - DATABASE_URL=sqlite:///data/panel.db
      - PANEL_LOG_LEVEL=info

volumes:
  panel-data:
